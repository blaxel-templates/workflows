name: Build and Push Image

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      repository:
        required: true
        type: string
      sha:
        required: true
        type: string
      bl_type:
        required: false
        type: string
        default: sandbox
        description: "Blaxel resource type: 'sandbox' or 'agent'"
    secrets:
      BL_ADMIN_USERNAME_DEV:
        required: true
      BL_ADMIN_PASSWORD_DEV:
        required: true
      BL_ADMIN_USERNAME_PROD:
        required: true
      BL_ADMIN_PASSWORD_PROD:
        required: true
      DEPOT_PROJECT_ID_DEV:
        required: true
      DEPOT_PROJECT_ID_PROD:
        required: true
      DEPOT_TOKEN_DEV:
        required: true
      DEPOT_TOKEN_PROD:
        required: true

env:
  REGISTRY: ghcr.io
  BL_ENV: ${{ inputs.environment == 'prod' && 'prod' || 'dev' }}
  DEV_IMAGE_BUCKET: controlplane-dev-build-images-eu-west-1-37df18
  PROD_IMAGE_BUCKET: controlplane-prod-build-images-us-west-2-466b17

jobs:
  build-ghcr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.image-tag.outputs.tag }}
      image-name: ${{ steps.repo-info.outputs.image-name }}
    steps:
      - name: Clone ${{ inputs.repository }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}

      - name: Extract repo info
        id: repo-info
        run: |
          REPO_NAME="${{ inputs.repository }}"
          REPO_NAME="${REPO_NAME##*/}"
          echo "repo-name=${REPO_NAME}" >> $GITHUB_OUTPUT
          # Image name uses the org and repo name
          REPO_OWNER="${{ inputs.repository }}"
          REPO_OWNER="${REPO_OWNER%%/*}"
          echo "image-name=${REPO_OWNER}/${REPO_NAME}" >> $GITHUB_OUTPUT

      - name: Set image tag
        id: image-tag
        run: |
          SHA_SHORT=$(echo "${{ inputs.sha }}" | cut -c1-7)
          echo "tag=${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo-info.outputs.image-name }}
          tags: |
            type=raw,value=${{ steps.image-tag.outputs.tag }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-blaxel:
    runs-on:
      - codebuild-blaxel-templates-${{ github.run_id }}-${{ github.run_attempt }}
    needs: build-ghcr
    environment: ${{ inputs.environment }}
    env:
      BL_API_URL: ${{ inputs.environment == 'prod' && vars.BL_ADMIN_API_URL_PROD || vars.BL_ADMIN_API_URL_DEV }}
      BL_ADMIN_USERNAME: ${{ inputs.environment == 'prod' && secrets.BL_ADMIN_USERNAME_PROD || secrets.BL_ADMIN_USERNAME_DEV }}
      BL_ADMIN_PASSWORD: ${{ inputs.environment == 'prod' && secrets.BL_ADMIN_PASSWORD_PROD || secrets.BL_ADMIN_PASSWORD_DEV }}
    steps:
      - name: Clone ${{ inputs.repository }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}

      - name: Install jq
        run: |
          if ! command -v jq &> /dev/null; then
            echo "jq not found, installing..."
            apt-get update && apt-get install -y jq || yum install -y jq
          else
            echo "jq is already installed"
          fi

      - name: Build image in Blaxel
        env:
          IMAGE_NAME: ${{ needs.build-ghcr.outputs.image-name }}
          IMAGE_TAG: ${{ needs.build-ghcr.outputs.image-tag }}
          BL_TYPE: ${{ inputs.bl_type }}
          BL_ENV: ${{ env.BL_ENV }}
          SRC_REGISTRY: ${{ env.REGISTRY }}/${{ needs.build-ghcr.outputs.image-name }}
          BASE_IMAGE_TAG: ${{ needs.build-ghcr.outputs.image-tag }}
          BUILD_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          LOG_LEVEL: debug
          IMAGE_BUCKET_MK3: ${{ env.BL_ENV == 'prod' && env.PROD_IMAGE_BUCKET || env.DEV_IMAGE_BUCKET }}
          DEPOT_PROJECT_ID: ${{ env.BL_ENV == 'prod' && secrets.DEPOT_PROJECT_ID_PROD || secrets.DEPOT_PROJECT_ID_DEV }}
          BATCH_JOB_QUEUE: ${{ env.BL_ENV == 'prod' && (vars.BATCH_JOB_QUEUE_PROD || 'controlplane-prod-build') || (vars.BATCH_JOB_QUEUE_DEV || 'controlplane-dev-build') }}
          BATCH_JOB_DEFINITION: ${{ env.BL_ENV == 'prod' && (vars.BATCH_JOB_DEFINITION_PROD || 'controlplane-prod-build') || (vars.BATCH_JOB_DEFINITION_DEV || 'controlplane-dev-build') }}
          BATCH_REGION: ${{ env.BL_ENV == 'prod' && (vars.BATCH_REGION_PROD || 'us-west-2') || (vars.BATCH_REGION_DEV || 'eu-west-1') }}
          DEPOT_TOKEN: ${{ env.BL_ENV == 'prod' && secrets.DEPOT_TOKEN_PROD || secrets.DEPOT_TOKEN_DEV }}
        run: |
          set -e
          set -x

          # Validate required environment variables
          for var in IMAGE_NAME IMAGE_TAG BL_ENV SRC_REGISTRY BUILD_ID IMAGE_BUCKET_MK3 DEPOT_PROJECT_ID BATCH_JOB_QUEUE BATCH_JOB_DEFINITION BATCH_REGION DEPOT_TOKEN BL_API_URL BL_ADMIN_USERNAME BL_ADMIN_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "Error: $var environment variable is required"
              exit 1
            fi
          done

          # Set defaults for optional variables
          BL_TYPE="${BL_TYPE:-sandbox}"
          LOG_LEVEL="${LOG_LEVEL:-debug}"
          BASE_IMAGE_TAG="${BASE_IMAGE_TAG:-latest}"

          # Extract repo name (strip org prefix)
          REPO_NAME="${IMAGE_NAME##*/}"

          # Map BL_TYPE to the S3 path prefix
          case "$BL_TYPE" in
              sandbox) TYPE_PREFIX="sbx" ;;
              agent)   TYPE_PREFIX="agt" ;;
              *)
                  echo "Error: Unknown BL_TYPE '$BL_TYPE'. Must be 'sandbox' or 'agent'."
                  exit 1
                  ;;
          esac

          echo "Starting mk3 build process..."
          echo "Image Name: $IMAGE_NAME"
          echo "Image Tag: $IMAGE_TAG"
          echo "BL Environment: $BL_ENV"
          echo "BL Type: $BL_TYPE ($TYPE_PREFIX)"
          echo "Build ID: $BUILD_ID"
          echo "Base Image Tag: $BASE_IMAGE_TAG"
          echo "Batch Job Queue: $BATCH_JOB_QUEUE"
          echo "Batch Job Definition: $BATCH_JOB_DEFINITION"
          echo "Batch Region: $BATCH_REGION"

          OUTPUT_S3="s3://$IMAGE_BUCKET_MK3/blaxel/$TYPE_PREFIX/$REPO_NAME/$IMAGE_TAG"
          echo "Target S3 location: $OUTPUT_S3"

          # Check if template.json has build.slim set to false
          NO_SLIM="false"
          TEMPLATE_FILE=""
          if [ -f "$IMAGE_NAME/template.json" ]; then
              TEMPLATE_FILE="$IMAGE_NAME/template.json"
          elif [ -f "hub/$IMAGE_NAME/template.json" ]; then
              TEMPLATE_FILE="hub/$IMAGE_NAME/template.json"
          fi

          if [ -n "$TEMPLATE_FILE" ]; then
              BUILD_SLIM=$(jq -r 'if .build.slim == false then "false" else "true" end' "$TEMPLATE_FILE")
              if [ "$BUILD_SLIM" = "false" ]; then
                  NO_SLIM="true"
                  echo "Template has build.slim=false, setting NO_SLIM=true"
              fi
          fi

          # Build container overrides with environment variables and command for the Batch job.
          IMAGE_REF="$SRC_REGISTRY:$BASE_IMAGE_TAG"
          CONTAINER_OVERRIDES=$(jq -n \
            --arg image "$IMAGE_REF" \
            --arg otel_enabled "false" \
            --arg bl_env "$BL_ENV" \
            --arg output_s3 "$OUTPUT_S3" \
            --arg no_optimize "false" \
            --arg depot_token "$DEPOT_TOKEN" \
            --arg bl_build_id "$BUILD_ID" \
            --arg bl_type "$BL_TYPE" \
            --arg bl_generation "mk3" \
            --arg log_level "$LOG_LEVEL" \
            --arg depot_project_id "$DEPOT_PROJECT_ID" \
            --arg no_slim "$NO_SLIM" \
            '{
              command: ["--image", $image],
              environment: [
                {name: "OTEL_ENABLED", value: $otel_enabled},
                {name: "BL_ENV", value: $bl_env},
                {name: "OUTPUT_S3", value: $output_s3},
                {name: "NO_OPTIMIZE", value: $no_optimize},
                {name: "DEPOT_TOKEN", value: $depot_token},
                {name: "BL_BUILD_ID", value: $bl_build_id},
                {name: "BL_TYPE", value: $bl_type},
                {name: "BL_GENERATION", value: $bl_generation},
                {name: "LOG_LEVEL", value: $log_level},
                {name: "DEPOT_PROJECT_ID", value: $depot_project_id},
                {name: "IMAGE", value: $image},
                {name: "NO_SLIM", value: $no_slim}
              ]
            }')

          SAFE_IMAGE_NAME="${IMAGE_NAME//[^a-zA-Z0-9-]/-}"
          JOB_NAME="mk3-build-${SAFE_IMAGE_NAME}-${IMAGE_TAG//[^a-zA-Z0-9-]/-}-$(date +%s)"

          echo "Submitting Batch job..."
          JOB_SUBMIT=$(aws batch submit-job \
            --job-name "$JOB_NAME" \
            --job-queue "$BATCH_JOB_QUEUE" \
            --job-definition "$BATCH_JOB_DEFINITION" \
            --region "$BATCH_REGION" \
            --container-overrides "$CONTAINER_OVERRIDES" \
            --output json)

          JOB_ID=$(echo "$JOB_SUBMIT" | jq -r '.jobId')
          if [ -z "$JOB_ID" ] || [ "$JOB_ID" = "null" ]; then
              echo "Error: Failed to submit Batch job"
              echo "$JOB_SUBMIT" | jq '.'
              exit 1
          fi

          echo "Batch job submitted: $JOB_ID"
          echo "Waiting for job to complete..."

          # Poll for job completion
          MAX_ATTEMPTS=180
          POLL_INTERVAL=10
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
              JOB_STATUS=$(aws batch describe-jobs \
                --jobs "$JOB_ID" \
                --region "$BATCH_REGION" \
                --query 'jobs[0].status' \
                --output text)

              echo "  Attempt $attempt/$MAX_ATTEMPTS: Job status $JOB_STATUS"

              case "$JOB_STATUS" in
                  SUCCEEDED)
                      echo "Build completed successfully"
                      break
                      ;;
                  FAILED)
                      echo "Build failed"
                      aws batch describe-jobs --jobs "$JOB_ID" --region "$BATCH_REGION" | jq '.jobs[0] | {status, statusReason, container: .container}'
                      exit 1
                      ;;
                  SUBMITTED|PENDING|RUNNABLE|STARTING|RUNNING)
                      sleep $POLL_INTERVAL
                      ;;
                  *)
                      echo "Unknown job status: $JOB_STATUS"
                      exit 1
                      ;;
              esac

              if [ $attempt -eq $MAX_ATTEMPTS ]; then
                  echo "Error: Job did not complete within timeout"
                  exit 1
              fi
          done

          # Update image registry after successful build
          echo "Updating image registry..."

          # Create Basic auth header
          AUTH_HEADER=$(echo -n "$BL_ADMIN_USERNAME:$BL_ADMIN_PASSWORD" | base64)

          WORKSPACE="blaxel"

          # Determine registry type based on the registry URL
          if [[ "$SRC_REGISTRY" == *"ghcr.io"* ]]; then
              REGISTRY_TYPE="github"
          else
              REGISTRY_TYPE="docker_hub"
          fi

          REGISTRY_URL=$(echo "$SRC_REGISTRY" | cut -d'/' -f1)

          API_PAYLOAD=$(jq -n \
            --arg registry "$REGISTRY_URL" \
            --arg workspace "$WORKSPACE" \
            --arg repository "$IMAGE_NAME" \
            --arg mk3 "blaxel/blaxel/$TYPE_PREFIX/$IMAGE_NAME:$IMAGE_TAG" \
            --arg tag "$IMAGE_TAG" \
            --arg registry_type "$REGISTRY_TYPE" \
            --arg original "$TYPE_PREFIX/$IMAGE_NAME:$IMAGE_TAG" \
            --arg region "$BATCH_REGION" \
            --arg bucket "$IMAGE_BUCKET_MK3" \
            '{
              registry: $registry,
              workspace: $workspace,
              repository: $repository,
              tag: $tag,
              registry_type: $registry_type,
              original: $original,
              region: $region,
              bucket: $bucket,
              mk3: $mk3
            }')

          echo "Calling Blaxel API to register image..."
          echo "URL: $BL_API_URL/admin/images"
          echo "Workspace: $WORKSPACE"
          echo "Repository: $REPO_NAME"
          echo "Tag: $IMAGE_TAG"
          echo "Payload: $API_PAYLOAD"

          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" --request PUT \
            --url "$BL_API_URL/admin/images" \
            --header "Authorization: Basic $AUTH_HEADER" \
            --header "Content-Type: application/json" \
            --data "$API_PAYLOAD")

          HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -n 1)
          HTTP_BODY=$(echo "$HTTP_RESPONSE" | sed '$d')

          echo "API Response Status: $HTTP_STATUS"
          if [ ! -z "$HTTP_BODY" ]; then
              echo "API Response Body: $HTTP_BODY"
          fi

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
              echo "Image successfully registered in Blaxel"
          else
              echo "Warning: Failed to register image in Blaxel (HTTP $HTTP_STATUS)"
          fi

          echo "mk3 build process completed successfully"
